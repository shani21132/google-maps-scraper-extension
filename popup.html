<!DOCTYPE html>
<html>
<head>
  <title>ZR Scraper</title>
  <style>
    body{
      width:250px;
      padding:15px;
      font-family:Arial;
    }

    button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      cursor:pointer;
      border-radius:5px;
      font-size:15px;
    }

    #startBtn{
      background:#007bff;
      color:white;
    }

    #downloadBtn{
      background:#28a745;
      color:white;
    }

    #downloadBtn:disabled{
      background:#999;
      cursor:not-allowed;
    }

    #status{
      margin-top:10px;
      font-size:14px;
    }
  </style>
</head>
<body>

  <h2>ZR Maps Scraper</h2>

  <button id="startBtn">Start Scraping</button>

  <button id="downloadBtn" disabled>
    Download CSV
  </button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
